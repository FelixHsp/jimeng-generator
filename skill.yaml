name: jimeng-generator
description: 即梦 4.0 图片生成器，通过文本描述生成高质量图片，支持多图编辑与智能比例
version: 0.1.0

requirements:
  env:
    - name: VOLCENGINE_AK
      description: 火山引擎 Access Key
      required: true
    - name: VOLCENGINE_SK
      description: 火山引擎 Secret Key
      required: false
    - name: VOLCENGINE_TOKEN
      description: 安全令牌（STS 临时凭证场景使用）
      required: false

  note: |
    永久凭证需要 AK + SK；临时凭证（STS）需要 AK + Token。
    前往火山引擎控制台 → 访问控制 → 密钥管理 获取凭证。

scripts:
  generate: npx ts-node scripts/generate.ts
